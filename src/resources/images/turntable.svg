<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .pit { fill: #f2f2f2; stroke: #222; stroke-width: 3; }
      .rim { fill: none; stroke: #888; stroke-width: 36; }
      .inner-ring { fill: none; stroke: #222; stroke-width: 5; }
      .service-ring { fill: none; stroke: #555; stroke-width: 2; stroke-dasharray: 8 8; }
      .bridge { fill: #cfcfcf; stroke: #222; stroke-width: 3; }
      .bridge-edge { stroke: #666; stroke-width: 2; }
      .rail1 { stroke: #ff0000; stroke-width: 5; stroke-linecap: round; }
      .rail2 { stroke: #111; stroke-width: 5; stroke-linecap: round; }
      .sleeper { stroke: #8b5a2b; stroke-width: 5; stroke-linecap: round; }
      .used .rail { stroke: #111; }
      .used .sleeper { stroke: #8b5a2b; }
      .unused .rail { stroke: #999; stroke-dasharray: 12 10; }
      .unused .sleeper { stroke: #aaa; stroke-dasharray: 6 8; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111; text-anchor: middle; dominant-baseline: middle; }
      .unused-label { fill: #888; }
      .small { font-size: 18px; font-weight: 400; }
      .legend { font-family: Arial, Helvetica, sans-serif; font-size: 24px; fill: #111; }
    </style>

    <!-- A radial track segment pointing to the right. Rotate around (600,600). -->
    <g id="track1">
      <line class="rail1" x1="920" y1="590" x2="1120" y2="590"/>
      <line class="rail2" x1="920" y1="610" x2="1120" y2="610"/>
      <g>
        <line class="sleeper" x1="945" y1="580" x2="945" y2="620"/>
        <line class="sleeper" x1="970" y1="580" x2="970" y2="620"/>
        <line class="sleeper" x1="995" y1="580" x2="995" y2="620"/>
        <line class="sleeper" x1="1020" y1="580" x2="1020" y2="620"/>
        <line class="sleeper" x1="1045" y1="580" x2="1045" y2="620"/>
        <line class="sleeper" x1="1070" y1="580" x2="1070" y2="620"/>
        <line class="sleeper" x1="1095" y1="580" x2="1095" y2="620"/>
      </g>
    </g>

    <!-- A radial track segment pointing to the right. Rotate around (600,600). -->
    <g id="track2">
      <line class="rail2" x1="920" y1="590" x2="1120" y2="590"/>
      <line class="rail1" x1="920" y1="610" x2="1120" y2="610"/>
      <g>
        <line class="sleeper" x1="945" y1="580" x2="945" y2="620"/>
        <line class="sleeper" x1="970" y1="580" x2="970" y2="620"/>
        <line class="sleeper" x1="995" y1="580" x2="995" y2="620"/>
        <line class="sleeper" x1="1020" y1="580" x2="1020" y2="620"/>
        <line class="sleeper" x1="1045" y1="580" x2="1045" y2="620"/>
        <line class="sleeper" x1="1070" y1="580" x2="1070" y2="620"/>
        <line class="sleeper" x1="1095" y1="580" x2="1095" y2="620"/>
      </g>
    </g>

  <!-- turntable bridge aligned with position 0 / 10 -->
  <g id="bridge">
    <rect class="bridge" x="295" y="565" width="610" height="70" rx="4"/>
    <line class="bridge-edge" x1="305" y1="585" x2="895" y2="585"/>
    <line class="bridge-edge" x1="305" y1="615" x2="895" y2="615"/>
    <line class="rail1" x1="295" y1="590" x2="905" y2="590" />
    <line class="rail2" x1="295" y1="610" x2="905" y2="610"/>
    <g>
      <line class="sleeper" x1="330" y1="580" x2="330" y2="620"/>
      <line class="sleeper" x1="360" y1="580" x2="360" y2="620"/>
      <line class="sleeper" x1="390" y1="580" x2="390" y2="620"/>
      <line class="sleeper" x1="420" y1="580" x2="420" y2="620"/>
      <line class="sleeper" x1="450" y1="580" x2="450" y2="620"/>
      <line class="sleeper" x1="480" y1="580" x2="480" y2="620"/>
      <line class="sleeper" x1="510" y1="580" x2="510" y2="620"/>
      <line class="sleeper" x1="540" y1="580" x2="540" y2="620"/>
      <line class="sleeper" x1="570" y1="580" x2="570" y2="620"/>
      <line class="sleeper" x1="600" y1="580" x2="600" y2="620"/>
      <line class="sleeper" x1="630" y1="580" x2="630" y2="620"/>
      <line class="sleeper" x1="660" y1="580" x2="660" y2="620"/>
      <line class="sleeper" x1="690" y1="580" x2="690" y2="620"/>
      <line class="sleeper" x1="720" y1="580" x2="720" y2="620"/>
      <line class="sleeper" x1="750" y1="580" x2="750" y2="620"/>
      <line class="sleeper" x1="780" y1="580" x2="780" y2="620"/>
      <line class="sleeper" x1="810" y1="580" x2="810" y2="620"/>
      <line class="sleeper" x1="840" y1="580" x2="840" y2="620"/>
      <line class="sleeper" x1="870" y1="580" x2="870" y2="620"/>
    </g>
    <circle cx="600" cy="600" r="18" fill="#b8b8b8" stroke="#222" stroke-width="3"/>
    <circle cx="600" cy="600" r="7" fill="#666"/>
    <circle cx="900" cy="630" r="7" fill="#000"/>
  </g>

  <g id="button1">
   <circle cx="900" cy="630" r="22" fill="#aabbcc"/>
  </g>

  </defs>

  <rect class="bg" width="1200" height="1200"/>

  <!-- turntable pit and rings -->
  <circle class="pit" cx="600" cy="600" r="315"/>
  <circle class="rim" cx="600" cy="600" r="345"/>
  <circle class="inner-ring" cx="600" cy="600" r="300"/>
  <circle class="service-ring" cx="600" cy="600" r="275"/>

  <!-- radial guide lines: 20 positions, 18 degrees apart clockwise -->
  <g stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6 9">
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(0 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(18 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(36 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(54 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(72 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(90 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(108 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(126 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(144 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(162 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(180 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(198 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(216 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(234 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(252 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(270 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(288 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(306 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(324 600 600)"/>
    <line x1="600" y1="600" x2="850" y2="600" transform="rotate(342 600 600)"/>
  </g>

  <g class="used"><use href="#bridge" transform="rotate(270 600 600)"/></g>

  <!-- tracks: SVG positive rotation is clockwise in screen coordinates -->
  <g class="used"><use href="#track1" transform="rotate(0 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(90 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(108 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(126 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(144 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(162 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(180 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(198 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(216 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(234 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(252 600 600)"/></g>
  <g class="used"><use href="#track2" transform="rotate(270 600 600)"/></g>
  <g class="used"><use href="#track1" transform="rotate(288 600 600)"/></g>
  <g class="used"><use href="#track1" transform="rotate(306 600 600)"/></g>
  <g class="used"><use href="#track1" transform="rotate(324 600 600)"/></g>
  <g class="used"><use href="#track1" transform="rotate(342 600 600)"/></g>


  <!-- labels, coordinates precomputed for radius 555 from center -->
  <text class="label" x="1155" y="600">0</text>
  <text class="label" x="600" y="1155">5</text>
  <text class="label" x="428.50" y="1127.73">6</text>
  <text class="label" x="273.76" y="1049.00">7</text>
  <text class="label" x="151.00" y="926.24">8</text>
  <text class="label" x="72.27" y="771.50">9</text>
  <text class="label" x="45" y="600">10</text>
  <text class="label" x="72.27" y="428.50">11</text>
  <text class="label" x="151.00" y="273.76">12</text>
  <text class="label" x="273.76" y="151.00">13</text>
  <text class="label" x="428.50" y="72.27">14</text>
  <text class="label" x="600" y="45">15</text>
  <text class="label" x="771.50" y="72.27">16</text>
  <text class="label" x="926.24" y="151.00">17</text>
  <text class="label" x="1049.00" y="273.76">18</text>
  <text class="label" x="1127.73" y="428.50">19</text>

  <g class="used"><use href="#button1" transform="rotate(180 600 600)"/></g>

</svg>
